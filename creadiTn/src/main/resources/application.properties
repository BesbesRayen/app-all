spring.application.name=creadiTn
# Database (env-first, with embedded H2 fallback)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./.data/creaditn;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (local debug)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Local file storage (KYC images served under /api/files/**)
app.upload-dir=uploads

# Server
server.port=${SERVER_PORT:8082}

# Swagger / OpenAPI 
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Sumsub KYC
sumsub.enabled=${SUMSUB_ENABLED:false}
sumsub.base-url=${SUMSUB_BASE_URL:https://api.sumsub.com}
sumsub.app-token=${SUMSUB_APP_TOKEN:}
sumsub.secret-key=${SUMSUB_SECRET_KEY:}
sumsub.level-name=${SUMSUB_LEVEL_NAME:basic-kyc-level}
sumsub.token-ttl-in-secs=${SUMSUB_TOKEN_TTL_IN_SECS:600}